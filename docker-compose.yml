services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URI: postgresql://courier:courier@db:5432/courier
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-moondream}
      SECRET_KEY: dev-secret-change-in-prod
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - uploads:/app/static/uploads
      - sessions:/app/flask_session
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: courier
      POSTGRES_PASSWORD: courier
      POSTGRES_DB: courier
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courier"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    # GPU passthrough (requires NVIDIA Container Toolkit / WSL2 NVIDIA driver on Windows).
    # Comment this block out if GPU is unavailable — Ollama falls back to CPU automatically.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  sessions:
  ollama:

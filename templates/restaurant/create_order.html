{% extends "base.html" %}

{% block title %}Create Order{% endblock %}

{% block content %}
<div class="py-6">
    <div class="mx-auto max-w-3xl px-4 sm:px-6 lg:px-8">
        <h1 class="text-2xl font-semibold text-gray-900">Create New Order</h1>

        <form action="{{ url_for('restaurant_create_order') }}" method="POST" class="mt-6 space-y-6">
            <div class="bg-white shadow sm:rounded-lg">
                <div class="px-4 py-5 sm:p-6 space-y-6">
                    <!-- Saved Customers Quick Select -->
                    {% if saved_customers %}
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                        <label for="customer_search" class="block text-sm font-medium text-blue-900 mb-2">
                            Quick Select: Saved Customers
                        </label>
                        <input type="text" id="customer_search" placeholder="Search by name or phone..."
                               oninput="filterCustomers()"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border bg-white mb-2">
                        <select id="saved_customer_select" onchange="fillCustomerData()" size="5"
                                class="block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border bg-white">
                            <option value="">-- Select a saved customer --</option>
                            {% for customer in saved_customers %}
                            <option value="{{ customer.id }}"
                                    data-name="{{ customer.customer_name }}"
                                    data-phone="{{ customer.customer_phone }}"
                                    data-address="{{ customer.delivery_address }}"
                                    data-search="{{ customer.customer_name|lower }} {{ customer.customer_phone }}">
                                {{ customer.customer_name }} - {{ customer.customer_phone }}
                            </option>
                            {% endfor %}
                        </select>
                        <p class="mt-1 text-xs text-blue-700">Search and select a customer to auto-fill their information</p>
                    </div>
                    {% endif %}

                    <!-- Customer Information -->
                    <div>
                        <h3 class="text-lg font-medium leading-6 text-gray-900">Customer Information</h3>
                        <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
                            <div>
                                <label for="customer_name" class="block text-sm font-medium text-gray-700">Customer Name</label>
                                <input type="text" name="customer_name" id="customer_name" required
                                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">
                            </div>
                            <div>
                                <label for="customer_phone" class="block text-sm font-medium text-gray-700">Customer Phone</label>
                                <input type="tel" name="customer_phone" id="customer_phone" required
                                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">
                            </div>
                        </div>
                        <div class="mt-3">
                            <label class="flex items-center">
                                <input type="checkbox" name="save_customer" id="save_customer"
                                       class="h-4 w-4 rounded border-gray-300 text-green-600 focus:ring-green-500">
                                <span class="ml-2 text-sm text-gray-700">Save this customer for future orders</span>
                            </label>
                        </div>
                    </div>

                    <!-- Delivery Information -->
                    <div>
                        <h3 class="text-lg font-medium leading-6 text-gray-900">Delivery Information</h3>
                        <div class="mt-4 space-y-4">
                            <div>
                                <label for="pickup_address" class="block text-sm font-medium text-gray-700">Pickup Address (Your Restaurant)</label>
                                <textarea name="pickup_address" id="pickup_address" rows="2" required
                                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">{{ current_user.current_location or '' }}</textarea>
                            </div>
                            <div>
                                <label for="delivery_address" class="block text-sm font-medium text-gray-700">Delivery Address</label>
                                <textarea name="delivery_address" id="delivery_address" rows="2" required
                                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Order Details -->
                    <div>
                        <h3 class="text-lg font-medium leading-6 text-gray-900">Order Details</h3>
                        <div class="mt-4 space-y-4">
                            <div>
                                <label for="items_description" class="block text-sm font-medium text-gray-700">Items Description *</label>
                                <textarea name="items_description" id="items_description" rows="3" required
                                          placeholder="e.g., 2x Large Pizza, 1x Garlic Bread, 2x Soda"
                                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border"></textarea>
                            </div>
                            <div>
                                <label for="order_value" class="block text-sm font-medium text-gray-700">Order Value (CZK) *</label>
                                <input type="number" name="order_value" id="order_value" step="0.01" min="0" required
                                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">
                            </div>
                            <div>
                                <label for="special_instructions" class="block text-sm font-medium text-gray-700">Special Instructions</label>
                                <textarea name="special_instructions" id="special_instructions" rows="2"
                                          placeholder="e.g., Ring doorbell, leave at door, etc."
                                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="submit"
                            class="inline-flex w-full justify-center rounded-md border border-transparent bg-green-600 px-4 py-2 text-base font-medium text-white shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 sm:ml-3 sm:w-auto sm:text-sm">
                        Create Order & Auto-Assign
                    </button>
                    <a href="{{ url_for('restaurant_dashboard') }}"
                       class="mt-3 inline-flex w-full justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 sm:mt-0 sm:w-auto sm:text-sm">
                        Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
function fillCustomerData() {
    const select = document.getElementById('saved_customer_select');
    const selectedOption = select.options[select.selectedIndex];

    if (selectedOption.value) {
        document.getElementById('customer_name').value = selectedOption.dataset.name;
        document.getElementById('customer_phone').value = selectedOption.dataset.phone;
        document.getElementById('delivery_address').value = selectedOption.dataset.address;
    } else {
        // Clear fields if "Select a saved customer" is chosen
        document.getElementById('customer_name').value = '';
        document.getElementById('customer_phone').value = '';
        document.getElementById('delivery_address').value = '';
    }
}

function filterCustomers() {
    const search = document.getElementById('customer_search').value.toLowerCase();
    const select = document.getElementById('saved_customer_select');

    for (let i = 0; i < select.options.length; i++) {
        const option = select.options[i];
        const searchText = option.dataset.search || '';

        if (searchText.includes(search) || option.value === '') {
            option.style.display = '';
        } else {
            option.style.display = 'none';
        }
    }
}
</script>
{% endblock %}

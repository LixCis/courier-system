{% extends "base.html" %}

{% block title %}Edit Order{% endblock %}

{% block content %}
<div class="py-6">
    <div class="mx-auto max-w-3xl px-4 sm:px-6 lg:px-8">
        <div class="mb-6">
            <a href="{{ url_for('restaurant_view_order', order_id=order.id) }}" class="text-green-600 hover:text-green-900">
                &larr; Back to Order Details
            </a>
        </div>

        <h1 class="text-2xl font-semibold text-gray-900">Edit Order: {{ order.order_number }}</h1>

        <form action="{{ url_for('restaurant_edit_order', order_id=order.id) }}" method="POST" class="mt-6 space-y-6">
            <div class="bg-white shadow sm:rounded-lg">
                <div class="px-4 py-5 sm:p-6 space-y-6">
                    <!-- Customer Information -->
                    <div>
                        <h3 class="text-lg font-medium leading-6 text-gray-900">Customer Information</h3>
                        <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">
                            <div>
                                <label for="customer_name" class="block text-sm font-medium text-gray-700">Customer Name</label>
                                <input type="text" name="customer_name" id="customer_name" required value="{{ order.customer_name }}"
                                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">
                            </div>
                            <div>
                                <label for="customer_phone" class="block text-sm font-medium text-gray-700">Customer Phone</label>
                                <input type="tel" name="customer_phone" id="customer_phone" required value="{{ order.customer_phone }}"
                                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">
                            </div>
                        </div>
                    </div>

                    <!-- Delivery Information -->
                    <div>
                        <h3 class="text-lg font-medium leading-6 text-gray-900">Delivery Information</h3>
                        <div class="mt-4 space-y-4">
                            <div>
                                <label for="pickup_address" class="block text-sm font-medium text-gray-700">Pickup Address</label>
                                <textarea name="pickup_address" id="pickup_address" rows="2" required
                                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">{{ order.pickup_address }}</textarea>
                            </div>
                            <div>
                                <label for="delivery_address" class="block text-sm font-medium text-gray-700">Delivery Address</label>
                                <textarea name="delivery_address" id="delivery_address" rows="2" required
                                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">{{ order.delivery_address }}</textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Order Details -->
                    <div>
                        <h3 class="text-lg font-medium leading-6 text-gray-900">Order Details</h3>
                        <div class="mt-4 space-y-4">
                            <div>
                                <label for="items_description" class="block text-sm font-medium text-gray-700">Items Description</label>
                                <textarea name="items_description" id="items_description" rows="3"
                                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">{{ order.items_description }}</textarea>
                            </div>
                            <div>
                                <label for="order_value" class="block text-sm font-medium text-gray-700">Order Value ($)</label>
                                <input type="number" name="order_value" id="order_value" step="0.01" min="0" value="{{ order.order_value }}"
                                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">
                            </div>
                            <div>
                                <label for="special_instructions" class="block text-sm font-medium text-gray-700">Special Instructions</label>
                                <textarea name="special_instructions" id="special_instructions" rows="2"
                                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500 sm:text-sm px-3 py-2 border">{{ order.special_instructions }}</textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="submit"
                            class="inline-flex w-full justify-center rounded-md border border-transparent bg-green-600 px-4 py-2 text-base font-medium text-white shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 sm:ml-3 sm:w-auto sm:text-sm">
                        Save Changes
                    </button>
                    <a href="{{ url_for('restaurant_view_order', order_id=order.id) }}"
                       class="mt-3 inline-flex w-full justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 sm:mt-0 sm:w-auto sm:text-sm">
                        Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-50">
    <div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full text-center">
            <h1 class="text-9xl font-bold text-gray-300">404</h1>
            <h2 class="mt-4 text-3xl font-bold text-gray-900">Page Not Found</h2>
            <p class="mt-2 text-gray-600">The page you're looking for doesn't exist.</p>
            <div class="mt-6">
                <a href="/" class="inline-flex items-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500">
                    Go to Dashboard
                </a>
            </div>
        </div>
    </div>
</body>
</html>
